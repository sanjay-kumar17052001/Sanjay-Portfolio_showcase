<script>

function openVideo(videoSrc){

document.getElementById("popup")
.classList.add("active");

const video=document.getElementById("popupVideo");

video.addEventListener("click", function(e){

e.preventDefault();

if(video.paused){

video.play();

}else{

video.pause();

}

});
video.controls = true;

const btn=document.getElementById("customPlay");

video.src=videoSrc;

video.onloadeddata = () => {

video.play();

setTimeout(()=>{

btn.classList.add("hide");
btn.classList.remove("show");

},300);

};

}

function closeVideo(){

document.getElementById("popup")
.classList.remove("active");

const video=document.getElementById("popupVideo");
const btn=document.getElementById("customPlay");

video.pause();
video.src="";

btn.classList.add("hide");
btn.classList.remove("show");

}

function togglePlay(){

const video=document.getElementById("popupVideo");
const btn=document.getElementById("customPlay");

if(video.paused){

video.play();

btn.classList.add("hide");
btn.classList.remove("show");

}else{

video.pause();

btn.classList.remove("hide");
btn.classList.add("show");

}

}

document.addEventListener("DOMContentLoaded",()=>{

const video=document.getElementById("popupVideo");
const btn=document.getElementById("customPlay");

video.addEventListener("pause",()=>{

btn.classList.remove("hide");
btn.classList.add("show");

});

video.addEventListener("play",()=>{

if(document.activeElement !== video){

btn.classList.add("hide");
btn.classList.remove("show");

}

});



video.addEventListener("ended",()=>{

btn.classList.remove("hide");
btn.classList.add("show");

});

});

</script>

<script>

function openPrompt(index){

const promptText=document.getElementById("promptText");

if(prompts[index]){

promptText.textContent=prompts[index];

}else{

promptText.textContent="Paste your AI prompt here...";

}

document
.getElementById("promptPopup")
.classList.add("active");

}

function closePrompt(){

document
.getElementById("promptPopup")
.classList.remove("active");

}

function copyPrompt(){

const text=document
.getElementById("promptText")
.textContent;

navigator.clipboard.writeText(text);

alert("Prompt copied!");

}

document
.getElementById("promptPopup")
.addEventListener("click",function(e){

if(e.target===this){

closePrompt();

}

});

</script>
